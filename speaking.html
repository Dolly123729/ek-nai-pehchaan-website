<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Speaking Partner – Learn Smart</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .speaking-card {
      max-width: 600px;
      margin: 40px auto;
      background: #fff;
      padding: 44px 36px;
      border-radius: 20px;
      box-shadow: 0 10px 32px rgba(30,79,216,0.12);
      border-top: 6px solid var(--blue);
      text-align: center;
    }

    .avatar-wrap { position: relative; display: inline-block; margin-bottom: 24px; }
    #robot-img {
      width: 150px; height: 150px;
      border-radius: 50%;
      border: 4px solid var(--border);
      object-fit: cover;
      transition: 0.3s;
    }
    .active-glow {
      border-color: #f59e0b !important;
      box-shadow: 0 0 22px rgba(245,158,11,0.45);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }

    #robotText { color: var(--muted); font-weight: 700; font-size: 16px; margin: 0 0 20px; line-height: 1.6; }

    #transcript {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      min-height: 70px;
      margin: 18px 0;
      color: var(--muted);
      font-style: italic;
      text-align: left;
      font-size: 14px;
      line-height: 1.6;
    }

    .btn-group { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 8px; }

    .btn-speak  { background: var(--blue-light); color: var(--blue); border: none; }
    .btn-mic    { background: #f59e0b; color: white; border: none; }
    .btn-stop   { background: #6b7280; color: white; border: none; }

    .btn-group button {
      padding: 12px 22px; border-radius: 10px; font-weight: 800;
      cursor: pointer; font-family: inherit; font-size: 14px;
      display: flex; align-items: center; gap: 8px;
      transition: 0.2s;
    }
    .btn-group button:hover { opacity: 0.88; transform: translateY(-2px); }

    #question-progress {
      display: inline-block;
      background: var(--blue-light);
      color: var(--blue);
      font-size: 12px;
      font-weight: 800;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    #playback { margin-top: 20px; width: 100%; border-radius: 8px; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="nav-inner">
    <a class="brand" href="index.html">
      <img src="logo.png.png" alt="Logo" class="logo-img" />
      <div class="brand-text">
        <div class="brand-title">Learning Smarter with AI</div>
        <div class="brand-sub">Ek Nai Pehchaan</div>
      </div>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="tools.html">AI Tools</a>
      <a href="quiz.html">Quiz</a>
      <a href="dashboard.html">Dashboard</a>
    </nav>
    <a href="index.html" class="btn-outline" style="font-size:13px;">← Back</a>
  </div>
</header>

<div class="container" style="padding: 20px 5% 60px;">
  <div class="speaking-card">
    <div class="avatar-wrap">
      <img src="robot.jpg.png" id="robot-img" alt="AI Speaking Partner" />
    </div>

    <div id="question-progress">Question 1 of 5</div>
    <h2 style="font-size:22px; margin-bottom:8px;">🤖 AI Speaking Partner</h2>
    <p id="robotText">"Hi! I'm your speaking coach. Press <b>Hear Prompt</b> to get your first question!"</p>

    <div id="transcript">Your speech will appear here in real-time as you speak...</div>

    <div class="btn-group">
      <button class="btn-speak" onclick="robotSpeak()">🔊 Hear Prompt</button>
      <button class="btn-mic" id="startBtn" onclick="startRecording()">🎤 Start Recording</button>
      <button class="btn-stop" onclick="stopRecording()">⏹ Stop & Get Feedback</button>
    </div>

    <audio id="playback" controls style="display:none;"></audio>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2025 Learning Smarter with AI · <a href="index.html">Home</a></p>
</footer>

<script src="speaking.js"></script>
</body>
</html>
